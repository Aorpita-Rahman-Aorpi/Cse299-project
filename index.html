<!DOCTYPE html>
<html>
<head>
    <title>Health Bot - Medicine Search</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px #ccc; }
        input { width: 80%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; border-bottom: 1px solid #eee; }
        .price { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Health Bot Medicine Search</h2>
        <input type="text" id="medName" placeholder="Enter medicine name (e.g. Napa)">
        <button onclick="searchMed()">Search</button>
        <div id="resultsList"></div>
    </div>

    <script>
        async function searchMed() {
            const name = document.getElementById('medName').value;
            const response = await fetch(`/search?name=${name}`);
            const data = await response.json();
            
            let html = '';
            data.forEach(med => {
                html += `
                    <div class="result">
                        <strong>${med.name}</strong> (${med.generic_name})<br>
                        Company: ${med.company} | <span class="price">Price: ${med.price_bdt} BDT</span><br>
                        <small>Dosage: ${med.dosage}</small>
                    </div>`;
            });
            document.getElementById('resultsList').innerHTML = html || '<p>No medicine found.</p>';
        }
    </script>
</body>
</html>
